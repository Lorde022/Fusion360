# Netlify configuration for the Fusion 360 course site.
# The course content lives in the fusion360-kurs/ subdirectory; this file
# tells Netlify to build and publish from there.

[build]
  base = "fusion360-kurs"
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Friendly URLs: /module/1-grundlagen/1-was-ist-cad → real .html
[[redirects]]
  from = "/module/:m/:l"
  to = "/module/:m/:l.html"
  status = 200
  force = false
